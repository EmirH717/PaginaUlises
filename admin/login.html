<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrador - FashionStyle</title>
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
    <header>
        <div class="header-container">
            <a href="../index.html" class="logo">👗 FashionStyle - Admin</a>
            <nav>
                <a href="../index.html">Volver a la Tienda</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="login-container">
            <h1 class="login-titulo">Área de Administrador</h1>
            
            <form id="formulario-login" onsubmit="iniciarSesion(event)">
                <div class="form-group">
                    <label for="usuario">Usuario</label>
                    <input type="text" id="usuario" name="usuario" required>
                </div>

                <div class="form-group">
                    <label for="contrasena">Contraseña</label>
                    <input type="password" id="contrasena" name="contrasena" required>
                </div>

                <button type="submit" class="btn-primario" style="width: 100%;">Ingresar</button>
            </form>

            <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #ddd; text-align: center;">
                <p style="color: #666; margin-bottom: 1rem;">
                    <strong>Demo Credentials:</strong><br>
                    Usuario: admin<br>
                    Contraseña: 1234
                </p>
                <p style="font-size: 0.9rem; color: #999;">
                    Este es un sistema de demostración. En producción, se utilizaría autenticación segura.
                </p>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-contenido">
            <p>&copy; 2024 FashionStyle. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="../js/app.js"></script>
    <script>
        function iniciarSesion(event) {
            event.preventDefault();
            
            const usuario = document.getElementById('usuario').value;
            const contrasena = document.getElementById('contrasena').value;
            
            // Credenciales de demo
            const usuarioValido = 'admin';
            const contrasenaValida = '1234';
            
            if (usuario === usuarioValido && contrasena === contrasenaValida) {
                localStorage.setItem('usuarioLogueado', 'admin');
                window.location.href = 'dashboard.html';
            } else {
                mostrarNotificacion('Usuario o contraseña incorrectos', 'error');
                document.getElementById('formulario-login').reset();
            }
        }

        // Redirigir si ya está logueado
        document.addEventListener('DOMContentLoaded', function() {
            if (esAdministrador()) {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
