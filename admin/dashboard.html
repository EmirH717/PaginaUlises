<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - FashionStyle</title>
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
    <header>
        <div class="header-container">
            <a href="../index.html" class="logo">👗 FashionStyle - Admin</a>
            <nav>
                <a href="../index.html">Tienda</a>
                <div class="user-menu">
                    <span>Admin</span>
                    <button onclick="cerrarSesion()" style="background-color: var(--color-acento);">Cerrar Sesión</button>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <div class="admin-header">
            <h1>🔧 Panel de Administración</h1>
            <p>Gestiona los productos y estadísticas de tu tienda</p>
        </div>

        <!-- Menú de Administración -->
        <div class="admin-menu">
            <button class="activo" onclick="cambiarSeccionAdmin('productos')">📦 Gestionar Productos</button>
            <button onclick="cambiarSeccionAdmin('agregar')">➕ Agregar Producto</button>
            <button onclick="cambiarSeccionAdmin('estadisticas')">📊 Estadísticas</button>
            <button onclick="cambiarSeccionAdmin('mensajes')">💬 Mensajes de Contacto</button>
        </div>

        <!-- SECCIÓN: GESTIONAR PRODUCTOS -->
        <section class="admin-seccion activa" id="seccion-productos">
            <div class="container">
                <h2 style="color: var(--color-primario); margin-bottom: 1.5rem;">Productos Disponibles</h2>
                <table class="tabla-productos">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Precio</th>
                            <th>Categoría</th>
                            <th>Tallas</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Se cargarán dinámicamente -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- SECCIÓN: AGREGAR/EDITAR PRODUCTO -->
        <section class="admin-seccion" id="seccion-agregar">
            <div class="container">
                <h2 id="form-titulo" style="color: var(--color-primario); margin-bottom: 1.5rem;">Agregar Nuevo Producto</h2>
                
                <form id="formulario-producto" onsubmit="guardarProductoAdmin(event)" style="max-width: 600px;">
                    <input type="hidden" id="producto-id">

                    <div class="form-group">
                        <label for="producto-nombre">Nombre del Producto</label>
                        <input type="text" id="producto-nombre" required>
                    </div>

                    <div class="form-group">
                        <label for="producto-descripcion">Descripción</label>
                        <textarea id="producto-descripcion" required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="producto-precio">Precio ($)</label>
                        <input type="number" id="producto-precio" step="0.01" required>
                    </div>

                    <div class="form-group">
                        <label for="producto-categoria">Categoría</label>
                        <select id="producto-categoria" required>
                            <option value="">Selecciona una categoría</option>
                            <option value="Camisetas">Camisetas</option>
                            <option value="Pantalones">Pantalones</option>
                            <option value="Sudaderas">Sudaderas</option>
                            <option value="Vestidos">Vestidos</option>
                            <option value="Chaquetas">Chaquetas</option>
                            <option value="Shorts">Shorts</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="producto-tallas">Tallas (separadas por comas)</label>
                        <input type="text" id="producto-tallas" placeholder="XS, S, M, L, XL" required>
                    </div>

                    <div class="form-group">
                        <label for="producto-imagen">Nombre de la Imagen</label>
                        <input type="text" id="producto-imagen" placeholder="imagen1.jpg">
                    </div>

                    <div style="display: flex; gap: 1rem;">
                        <button type="submit" class="btn-primario">Guardar Producto</button>
                        <button type="button" class="btn-secundario" onclick="limpiarFormulario()">Limpiar</button>
                    </div>
                </form>
            </div>
        </section>

        <!-- SECCIÓN: ESTADÍSTICAS -->
        <section class="admin-seccion" id="seccion-estadisticas">
            <!-- Se cargarán dinámicamente -->
        </section>

        <!-- SECCIÓN: MENSAJES DE CONTACTO -->
        <section class="admin-seccion" id="seccion-mensajes">
            <div class="container">
                <h2 style="color: var(--color-primario); margin-bottom: 1.5rem;">Mensajes de Contacto</h2>
                <div id="lista-mensajes">
                    <!-- Se cargarán dinámicamente -->
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-contenido">
            <p>&copy; 2024 FashionStyle. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="../js/app.js"></script>
    <script src="../js/carrito.js"></script>
    <script src="../js/admin.js"></script>
    <script>
        // Cargar mensajes de contacto
        function cargarMensajes() {
            const contenedor = document.getElementById('lista-mensajes');
            const contactos = JSON.parse(localStorage.getItem('contactos') || '[]');
            
            if (contactos.length === 0) {
                contenedor.innerHTML = '<p style="text-align: center; color: #666;">No hay mensajes de contacto.</p>';
                return;
            }
            
            let html = '';
            contactos.forEach((contacto, index) => {
                html += `
                    <div style="background: var(--color-fondo); padding: 1rem; border-radius: 8px; margin-bottom: 1rem; border-left: 4px solid var(--color-primario);">
                        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 0.5rem;">
                            <h3 style="color: var(--color-primario); margin: 0;">${contacto.nombre}</h3>
                            <span style="background: var(--color-acento); color: white; padding: 0.3rem 0.8rem; border-radius: 4px; font-size: 0.85rem;">${contacto.asunto}</span>
                        </div>
                        <p style="margin: 0.5rem 0;"><strong>Email:</strong> ${contacto.email}</p>
                        <p style="margin: 0.5rem 0;"><strong>Teléfono:</strong> ${contacto.telefono || 'No proporcionado'}</p>
                        <p style="margin: 0.5rem 0;"><strong>Fecha:</strong> ${contacto.fecha}</p>
                        <p style="margin: 0.5rem 0; background: white; padding: 0.5rem; border-radius: 4px;"><strong>Mensaje:</strong><br>${contacto.mensaje}</p>
                        <button onclick="eliminarMensaje(${index})" style="background: var(--color-acento); color: white; border: none; padding: 0.4rem 0.8rem; border-radius: 4px; cursor: pointer;">Eliminar</button>
                    </div>
                `;
            });
            
            contenedor.innerHTML = html;
        }
        
        function eliminarMensaje(index) {
            if (confirm('¿Estás seguro de que deseas eliminar este mensaje?')) {
                let contactos = JSON.parse(localStorage.getItem('contactos') || '[]');
                contactos.splice(index, 1);
                localStorage.setItem('contactos', JSON.stringify(contactos));
                cargarMensajes();
                mostrarNotificacion('Mensaje eliminado', 'exito');
            }
        }
        
        // Actualizar el cambiar de sección
        const cambiarSeccionAdminOriginal = cambiarSeccionAdmin;
        window.cambiarSeccionAdmin = function(seccion) {
            cambiarSeccionAdminOriginal(seccion);
            if (seccion === 'mensajes') {
                cargarMensajes();
            }
        };
        
        // Cargar mensajes al iniciar
        document.addEventListener('DOMContentLoaded', function() {
            cargarMensajes();
        });
    </script>
</body>
</html>
